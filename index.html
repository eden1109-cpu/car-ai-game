<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>5 Lane Car Dodge</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #10131a;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: white;
      touch-action: none;
    }

    #gameWrap {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at center, #252b3a 0%, #10131a 70%);
    }

    canvas {
      width: min(100vw, 520px);
      height: 100vh;
      max-height: 940px;
      background: #222;
      display: block;
      box-shadow: 0 0 40px rgba(0,0,0,0.55);
    }

    #ui {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: min(100vw, 520px);
      padding: 0 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-shadow: 0 2px 8px rgba(0,0,0,0.45);
    }

    #score {
      font-size: 18px;
    }

    #best {
      font-size: 13px;
      opacity: 0.85;
    }

    #message {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(86vw, 420px);
      padding: 26px 22px;
      border-radius: 24px;
      background: rgba(10, 12, 18, 0.76);
      backdrop-filter: blur(10px);
      text-align: center;
      box-shadow: 0 18px 48px rgba(0,0,0,0.5);
    }

    #message h1 {
      margin: 0 0 10px;
      font-size: 26px;
    }

    #message p {
      margin: 8px 0;
      line-height: 1.6;
      font-size: 14px;
      opacity: 0.9;
    }

    #message button {
      margin-top: 18px;
      border: none;
      border-radius: 999px;
      padding: 13px 28px;
      font-size: 16px;
      font-weight: 800;
      color: #10131a;
      background: #ffffff;
      cursor: pointer;
    }

    #controls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: min(100vw, 520px);
      display: flex;
      justify-content: space-between;
      padding: 0 24px;
      pointer-events: none;
    }

    .touchBtn {
      width: 86px;
      height: 86px;
      border-radius: 50%;
      background: rgba(255,255,255,0.13);
      border: 1px solid rgba(255,255,255,0.22);
      display: grid;
      place-items: center;
      font-size: 34px;
      font-weight: 900;
      user-select: none;
      pointer-events: auto;
      backdrop-filter: blur(8px);
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div id="gameWrap">
    <canvas id="gameCanvas"></canvas>

    <div id="ui">
      <div id="score">SCORE 0</div>
      <div id="best">BEST 0</div>
    </div>

    <div id="message">
      <h1>5 LANE DODGE</h1>
      <p>5車線を左右に移動して、流れてくる障害物を避けろ。</p>
      <p>スマホ：左右ボタン / スワイプ<br>PC：← → キー</p>
      <button id="startBtn">START</button>
    </div>

    <div id="controls">
      <div class="touchBtn" id="leftBtn">‹</div>
      <div class="touchBtn" id="rightBtn">›</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const messageEl = document.getElementById('message');
    const startBtn = document.getElementById('startBtn');
    const leftBtn = document.getElementById('leftBtn');
    const rightBtn = document.getElementById('rightBtn');

    const LANES = 5;
    let W = 0;
    let H = 0;
    let laneW = 0;
    let roadX = 0;
    let roadW = 0;

    let player;
    let obstacles;
    let particles;
    let score;
    let best = Number(localStorage.getItem('fiveLaneBest') || 0);
    let speed;
    let spawnTimer;
    let spawnInterval;
    let running = false;
    let gameOver = false;
    let lastTime = 0;
    let touchStartX = null;

    bestEl.textContent = `BEST ${best}`;

    function resize() {
      const displayW = Math.min(window.innerWidth, 520);
      const displayH = Math.min(window.innerHeight, 940);
      const dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));

      canvas.style.width = `${displayW}px`;
      canvas.style.height = `${displayH}px`;
      canvas.width = Math.floor(displayW * dpr);
      canvas.height = Math.floor(displayH * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      W = displayW;
      H = displayH;
      roadW = W * 0.9;
      roadX = (W - roadW) / 2;
      laneW = roadW / LANES;
    }

    function laneCenter(lane) {
      return roadX + laneW * lane + laneW / 2;
    }

    function resetGame() {
      player = {
        lane: 2,
        targetX: laneCenter(2),
        x: laneCenter(2),
        y: H - 140,
        w: Math.min(laneW * 0.58, 54),
        h: 76
      };
      obstacles = [];
      particles = [];
      score = 0;
      speed = 270;
      spawnTimer = 0;
      spawnInterval = 780;
      gameOver = false;
      running = true;
      lastTime = performance.now();
      scoreEl.textContent = 'SCORE 0';
      messageEl.classList.add('hidden');
    }

    function moveLane(direction) {
      if (!running || gameOver) return;
      player.lane = Math.max(0, Math.min(LANES - 1, player.lane + direction));
      player.targetX = laneCenter(player.lane);
    }

    function spawnObstacle() {
      const lane = Math.floor(Math.random() * LANES);
      const width = Math.min(laneW * 0.58, 56);
      obstacles.push({
        lane,
        x: laneCenter(lane),
        y: -90,
        w: width,
        h: 72,
        passed: false,
        type: Math.random() < 0.55 ? 'cone' : 'block'
      });
    }

    function rectsOverlap(a, b) {
      return Math.abs(a.x - b.x) < (a.w + b.w) / 2 - 8 &&
             Math.abs(a.y - b.y) < (a.h + b.h) / 2 - 8;
    }

    function endGame() {
      running = false;
      gameOver = true;
      best = Math.max(best, Math.floor(score));
      localStorage.setItem('fiveLaneBest', best);
      bestEl.textContent = `BEST ${best}`;

      for (let i = 0; i < 24; i++) {
        particles.push({
          x: player.x,
          y: player.y,
          vx: (Math.random() - 0.5) * 420,
          vy: (Math.random() - 0.5) * 420,
          life: 600 + Math.random() * 300
        });
      }

      setTimeout(() => {
        messageEl.innerHTML = `
          <h1>GAME OVER</h1>
          <p>スコア：${Math.floor(score)}</p>
          <p>左右移動のタイミングを早めると避けやすい。</p>
          <button id="restartBtn">RETRY</button>
        `;
        messageEl.classList.remove('hidden');
        document.getElementById('restartBtn').addEventListener('click', resetGame);
      }, 450);
    }

    function update(dt) {
      if (!running) {
        updateParticles(dt);
        return;
      }

      const seconds = dt / 1000;
      score += seconds * 12;
      speed += seconds * 8;
      spawnInterval = Math.max(360, 780 - score * 2.1);
      scoreEl.textContent = `SCORE ${Math.floor(score)}`;

      player.x += (player.targetX - player.x) * Math.min(1, seconds * 14);

      spawnTimer += dt;
      if (spawnTimer >= spawnInterval) {
        spawnTimer = 0;
        spawnObstacle();
      }

      obstacles.forEach(o => {
        o.y += speed * seconds;
        if (!o.passed && o.y > player.y + player.h) {
          o.passed = true;
          score += 10;
        }
      });
      obstacles = obstacles.filter(o => o.y < H + 120);

      for (const o of obstacles) {
        if (rectsOverlap(player, o)) {
          endGame();
          break;
        }
      }

      updateParticles(dt);
    }

    function updateParticles(dt) {
      const seconds = dt / 1000;
      particles.forEach(p => {
        p.x += p.vx * seconds;
        p.y += p.vy * seconds;
        p.vx *= 0.97;
        p.vy *= 0.97;
        p.life -= dt;
      });
      particles = particles.filter(p => p.life > 0);
    }

    function drawRoad() {
      ctx.fillStyle = '#2a2f3a';
      ctx.fillRect(roadX, 0, roadW, H);

      ctx.fillStyle = '#1b1f27';
      ctx.fillRect(0, 0, roadX, H);
      ctx.fillRect(roadX + roadW, 0, roadX, H);

      ctx.strokeStyle = 'rgba(255,255,255,0.25)';
      ctx.lineWidth = 2;
      ctx.setLineDash([18, 18]);
      for (let i = 1; i < LANES; i++) {
        const x = roadX + laneW * i;
        ctx.beginPath();
        ctx.moveTo(x, -40 + (score * 6) % 36);
        ctx.lineTo(x, H + 40);
        ctx.stroke();
      }
      ctx.setLineDash([]);

      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.fillRect(roadX, 0, 4, H);
      ctx.fillRect(roadX + roadW - 4, 0, 4, H);
    }

    function drawCar(x, y, w, h, color, isPlayer = false) {
      ctx.save();
      ctx.translate(x, y);

      ctx.fillStyle = 'rgba(0,0,0,0.28)';
      ctx.beginPath();
      ctx.ellipse(0, h * 0.42, w * 0.52, 10, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = color;
      roundRect(-w / 2, -h / 2, w, h, 12);
      ctx.fill();

      ctx.fillStyle = isPlayer ? '#dcefff' : '#2d3342';
      roundRect(-w * 0.32, -h * 0.28, w * 0.64, h * 0.26, 7);
      ctx.fill();
      roundRect(-w * 0.32, h * 0.05, w * 0.64, h * 0.22, 7);
      ctx.fill();

      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.fillRect(-w * 0.34, -h * 0.48, w * 0.18, 5);
      ctx.fillRect(w * 0.16, -h * 0.48, w * 0.18, 5);

      ctx.restore();
    }

    function drawObstacle(o) {
      if (o.type === 'cone') {
        ctx.save();
        ctx.translate(o.x, o.y);
        ctx.fillStyle = '#ff9d2e';
        ctx.beginPath();
        ctx.moveTo(0, -o.h / 2);
        ctx.lineTo(-o.w / 2, o.h / 2);
        ctx.lineTo(o.w / 2, o.h / 2);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.fillRect(-o.w * 0.28, 2, o.w * 0.56, 7);
        ctx.fillStyle = '#d65e1a';
        ctx.fillRect(-o.w * 0.52, o.h / 2 - 8, o.w * 1.04, 10);
        ctx.restore();
      } else {
        drawCar(o.x, o.y, o.w, o.h, '#c64545');
      }
    }

    function drawParticles() {
      particles.forEach(p => {
        ctx.globalAlpha = Math.max(0, p.life / 800);
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      drawRoad();
      obstacles.forEach(drawObstacle);
      if (player) drawCar(player.x, player.y, player.w, player.h, '#4da3ff', true);
      drawParticles();
    }

    function loop(now) {
      const dt = Math.min(33, now - lastTime || 16);
      lastTime = now;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener('resize', () => {
      resize();
      if (player) {
        player.targetX = laneCenter(player.lane);
        player.x = player.targetX;
        player.y = H - 140;
        player.w = Math.min(laneW * 0.58, 54);
      }
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft' || e.key === 'a') moveLane(-1);
      if (e.key === 'ArrowRight' || e.key === 'd') moveLane(1);
      if ((e.key === 'Enter' || e.key === ' ') && !running) resetGame();
    });

    leftBtn.addEventListener('pointerdown', () => moveLane(-1));
    rightBtn.addEventListener('pointerdown', () => moveLane(1));
    startBtn.addEventListener('click', resetGame);

    canvas.addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
    }, { passive: false });

    canvas.addEventListener('touchend', e => {
      if (touchStartX === null) return;
      const endX = e.changedTouches[0].clientX;
      const diff = endX - touchStartX;
      if (Math.abs(diff) > 28) moveLane(diff > 0 ? 1 : -1);
      touchStartX = null;
    }, { passive: false });

    resize();
    resetGame();
    running = false;
    gameOver = false;
    messageEl.classList.remove('hidden');
    requestAnimationFrame(loop);
  </script>
</body>
</html>
