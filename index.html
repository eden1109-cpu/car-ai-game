<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>5 Lane Car Dodge+</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="gameWrap">
    <canvas id="gameCanvas"></canvas>

    <div id="uiTop">
      <div class="panel" id="score">SCORE 0</div>
      <div class="panel" id="best">BEST 0</div>
      <div class="panel" id="coins">COIN 0</div>
    </div>

    <div id="fxLabel" class="hidden">+1 COIN</div>

    <div id="message">
      <h1>5 LANE DODGE</h1>
      <p>5車線を左右に移動して敵車を避け、コインを集めよう。</p>
      <p>スマホ：左右ボタン / スワイプ<br>PC：← → キー</p>
      <label for="skinSelect">スキン選択</label>
      <select id="skinSelect"></select>
      <button id="startBtn">START</button>
    </div>

    <div id="controls">
      <button class="touchBtn" id="leftBtn" aria-label="left">‹</button>
      <button class="touchBtn" id="rightBtn" aria-label="right">›</button>
    </div>
  </div>

  <script>window.__GAME_READY__=false;</script>
  <script src="./game.js" defer></script>
  <script>
    setTimeout(() => {
      if (!window.__GAME_READY__) {
        const msg = document.getElementById('message');
        if (msg) {
          msg.classList.remove('hidden');
          msg.querySelector('h1').textContent = 'LOAD ERROR';
          msg.querySelector('p').textContent = 'ゲームの読み込みに失敗しました。再読み込みしてください。';
        }
      }
    }, 1500);
  </script>
</body>
</html>
